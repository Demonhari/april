<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>APRIL Desktop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <noscript>APRIL Desktop requires JavaScript. It runs entirely on 127.0.0.1.</noscript>
    <div id="app" class="booting">
      <!-- Top system rail. Brand + compact cockpit nav + live system status.
           All status values are rendered by the SPA from authenticated API data
           after the local credential is acquired; nothing here is pre-filled. -->
      <header id="topbar" role="banner">
        <div class="brand">
          <span class="brand-mark">APRIL</span>
          <span class="brand-sub">local-first assistant</span>
        </div>
        <nav id="nav" aria-label="Sections">
          <button class="navitem" data-screen="dashboard">Dashboard</button>
          <button class="navitem" data-screen="chat">Chat</button>
          <button class="navitem" data-screen="projects">Projects</button>
          <button class="navitem" data-screen="approvals">Approvals</button>
          <button class="navitem" data-screen="memory">Memory</button>
          <button class="navitem" data-screen="reminders">Reminders</button>
          <button class="navitem" data-screen="readiness">Readiness</button>
          <button class="navitem" data-screen="status">Status</button>
          <button class="navitem" data-screen="activity">Activity</button>
        </nav>
        <div id="rail" class="rail" aria-live="polite">
          <span class="rail-item" id="rail-systems"><span class="dot"></span><span class="rail-label">systems</span><span class="rail-val">connecting…</span></span>
          <span class="rail-item" id="rail-backend"><span class="rail-label">backend</span><span class="rail-val">—</span></span>
          <span class="rail-item" id="rail-project"><span class="rail-label">project</span><span class="rail-val">—</span></span>
          <span class="rail-item" id="rail-conv"><span class="rail-label">conv</span><span class="rail-val">—</span></span>
          <span class="rail-item rail-local" id="rail-local"><span class="dot ok"></span><span class="rail-val">127.0.0.1 · offline-capable</span></span>
        </div>
      </header>

      <div class="banner" id="banner">
        <span id="banner-text"></span>
        <button id="banner-dismiss" type="button">dismiss</button>
      </div>

      <!-- Active screen renders here. Default screen is the cockpit Dashboard,
           mounted by the SPA only after authentication succeeds. -->
      <main id="screen" aria-live="polite"></main>
    </div>
    <script src="token_bridge.js"></script>
    <script src="dashboard_helpers.js"></script>
    <script src="app.js"></script>
  </body>
</html>
