models:
  brain:
    id: april-brain
    name: granite3.3-2b
    path: models/granite3.3-2b-q4_k_m.gguf
    backend: llama_cpp
    role: brain
    threads: 8
    context_size: 8192
    temperature: 0.3
    max_output_tokens: 1024
    keep_loaded: true
    idle_unload_seconds: null
    priority: 100

  coding:
    id: april-coding
    name: qwen3-1.7b
    path: models/qwen3-1.7b-q8_0.gguf
    backend: llama_cpp
    role: coding
    threads: 8
    context_size: 8192
    temperature: 0.2
    max_output_tokens: 2048
    keep_loaded: false
    idle_unload_seconds: 300
    priority: 50

  reading:
    id: april-reading
    name: qwen3-0.6b
    path: models/qwen3-0.6b-q8_0.gguf
    backend: llama_cpp
    role: reading
    threads: 6
    context_size: 4096
    temperature: 0.2
    max_output_tokens: 1024
    keep_loaded: false
    idle_unload_seconds: 300
    priority: 40

  # Optional: register a larger model for deep reasoning / architecture mode.
  # The reasoning agent runs on the brain model by default and automatically
  # upgrades to a registered role: reasoning model whenever one is available.
  # Import a real GGUF with:
  #   run april model import --role reasoning --id april-reasoning \
  #     --path models/your-reasoning-model-q4_k_m.gguf
  # then uncomment and adjust the entry below (commented out so it does not
  # point at a missing file and degrade runtime health).
  # reasoning:
  #   id: april-reasoning
  #   name: your-reasoning-model
  #   path: models/your-reasoning-model-q4_k_m.gguf
  #   backend: llama_cpp
  #   role: reasoning
  #   threads: 8
  #   context_size: 8192
  #   temperature: 0.4
  #   max_output_tokens: 2048
  #   keep_loaded: false
  #   idle_unload_seconds: 300
  #   priority: 60
