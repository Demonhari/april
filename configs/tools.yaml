tools:
  command_allowlist:
    - executable: pytest
      subcommands: []
      permission_level: 3
      risk_level: code_write
    - executable: ruff
      subcommands: [check, format]
      permission_level: 3
      risk_level: code_write
    - executable: python
      subcommands: [-m]
      permission_level: 3
      risk_level: code_write
  open_app_allowlist:
    - TextEdit
  open_url_allowed_schemes:
    - http
    - https
