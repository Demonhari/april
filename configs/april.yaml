api:
  host: 127.0.0.1
  port: 8765
  token: local-dev-token
  cors_enabled: false
  max_request_bytes: 1048576

runtime:
  host: 127.0.0.1
  port: 8766
  url: http://127.0.0.1:8766
  token: local-dev-runtime-token
  backend: llama_cpp
  preload_keep_loaded: true
  request_timeout_seconds: 120
  max_loaded_specialist_models: 2

memory:
  database_path: data/april.db
  vector_index_path: data/vector_index
  embedding_provider: hashed-token
  embedding_model_id: null

paths:
  logs_path: logs
  audit_path: logs/audit.jsonl
  allowed_filesystem_roots:
    - .
  max_file_read_bytes: 1048576
  max_file_write_bytes: 1048576

permissions:
  approval_expiry_seconds: 900
  maximum_agent_tool_iterations: 5
  external_actions_enabled: false
  tool_timeout_seconds: 15

brain:
  model_id: april-brain

# Voice is OFF by default and entirely local. It stays opt-in: enabling it needs
# the optional `.[voice]` extra plus whisper.cpp / Piper binaries and models you
# provide, then `run april setup voice`. While disabled, missing voice artifacts
# are skipped by readiness/target-Mac verification, never treated as blockers.
voice:
  enabled: false
  audio_cache_path: data/audio_cache
  retain_debug_audio: false
  whisper_binary_path: null
  whisper_model_path: null
  piper_binary_path: null
  piper_model_path: null
  wake_word_model_path: null

# Proactive scheduler. OFF by default: with these safe defaults APRIL never fires
# reminders or daily briefings on its own. The background loop only starts when
# enabled is true, and briefings only fire when briefing_enabled is true.
scheduler:
  # Master switch for the background poll loop that fires due reminders.
  enabled: false
  # How often the loop wakes to check for due reminders / briefing time (seconds).
  poll_interval_seconds: 30
  # Where notifications go: "log" (audit + logs/scheduler.log) or "macos" (native banner).
  notification_sink: log
  # Daily briefing switch. Independent of `enabled`; the briefing path is gated by this.
  briefing_enabled: false
  # Local time of day (HH:MM, 24h) to fire the daily briefing, once per local day.
  briefing_time: "08:00"
  # Read-only repo monitoring surfaced inside the daily briefing. OFF by default.
  # When true, the briefing lists registered projects with new commits or
  # uncommitted changes since the last briefing. Never accesses the network.
  repo_monitor_enabled: false
